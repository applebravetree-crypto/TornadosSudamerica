        }
        .popup_header_F5 {
            background-color: #CC00CC;
            color: #ffffff;
        }
        span.F {
            padding: 0 1px 0 1px;
            font-weight: bold;
            font-size: 12px;
            color: #ffffff;
            border-radius: 25%;
        }
        span.FU {
            background-color: #333333;
        }
        span.F0 {
            background-color: #00CCCC;

        span.F1 {

        }
        span.F4 {

        }
        span.F5 {
            background-color: #CC00CC;
        }

        span.source {
            padding: 2px 1px 0px 1px;
            border-bottom: 1px solid #000000;
        }
	</style>
</head>

<script>

    const checkpoints = L.layerGroup();
    const startMarkers = L.layerGroup();
    const FU_startMarkers = L.layerGroup();
    const F0_startMarkers = L.layerGroup();
    const F1_startMarkers = L.layerGroup();
    const F2_startMarkers = L.layerGroup();
    const F3_startMarkers = L.layerGroup();
    const F4_startMarkers = L.layerGroup();
    const F5_startMarkers = L.layerGroup();
    const FU_tornadoes = L.layerGroup();
    const F0_tornadoes = L.layerGroup();
    const F1_tornadoes = L.layerGroup();
    const F2_tornadoes = L.layerGroup();
    const F3_tornadoes = L.layerGroup();
    const F4_tornadoes = L.layerGroup();
    const F5_tornadoes = L.layerGroup();
    const FU_damage_paths = L.layerGroup();
    const F0_damage_paths = L.layerGroup();
    const F1_damage_paths = L.layerGroup();
    const F2_damage_paths = L.layerGroup();
    const F3_damage_paths = L.layerGroup();
    const F4_damage_paths = L.layerGroup();
    const F5_damage_paths = L.layerGroup();
    
    const styles_FU = {color: "#333333", weight: 6};
    const styles_F0 = {color: "#00CCCC", weight: 6};
    const styles_F1 = {color: "#0066FF", weight: 6};
    const styles_F2 = {color: "#CCBB00", weight: 6};
    const styles_F3 = {color: "#CC6600", weight: 6};
    const styles_F4 = {color: "#990000", weight: 6};
    const styles_F5 = {color: "#CC00CC", weight: 6};
    const styles_FU_damage_path = {color: "#222222", weight: 0, opacity: 0.4};
    const styles_F0_damage_path = {color: "#009999", weight: 0, opacity: 0.4};
    const styles_F1_damage_path = {color: "#0044CC", weight: 0, opacity: 0.4};
    const styles_F2_damage_path = {color: "#998800", weight: 0, opacity: 0.4};
    const styles_F3_damage_path = {color: "#994400", weight: 0, opacity: 0.4};
    const styles_F4_damage_path = {color: "#770000", weight: 0, opacity: 0.4};
    const styles_F5_damage_path = {color: "#990099", weight: 0, opacity: 0.4};
    const styles_StartMarker = {color: "#FFFFFF", weight: 3, opacity: 0.8};

    const tornado_image = L.imageOverlay("../Images/Agua_Santa_TornadoPath_20180612.png", [[-28.382, -52.296],[-28.055, -51.835]], {
        opacity: 0.0
    }).addTo(FU_damage_paths);
    const tornado_image_2 = L.imageOverlay("images/tornadoes_mortreros_19781028.png", [[-31, -62.41],[-30.625, -61.74]], {
        opacity: 0.2
    }).addTo(FU_damage_paths);

    const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ',
    });
	const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    });
    const osmHOT = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles style by <a href="https://www.hotosm.org/" target="_blank">Humanitarian OpenStreetMap Team</a> hosted by <a href="https://openstreetmap.fr/" target="_blank">OpenStreetMap France</a>'
    });
    const openTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)'
    });

	const map = L.map('map', {
        minZoom: 1,
        maxZoom: 15,
        layers: [esri, FU_damage_paths, F0_damage_paths, F1_damage_paths, F2_damage_paths, F3_damage_paths, F4_damage_paths, F5_damage_paths, FU_tornadoes, FU_startMarkers, F0_tornadoes, F0_startMarkers, F1_tornadoes, F1_startMarkers, F2_tornadoes, F2_startMarkers, F3_tornadoes, F3_startMarkers, F4_tornadoes, F4_startMarkers, F5_tornadoes, F5_startMarkers, startMarkers]
	}).setView([-25, -60],4);

    const baseLayers = {
        "OpenStreetMap": osm,
        "OpenStreetMap.HOT": osmHOT,
        "OpenTopoMap": openTopoMap,
        "Esri": esri
    };
    const overlays = {
        "Start markers": startMarkers
    };

    const layerControl = L.control.layers(baseLayers, overlays).addTo(map);

	L.control.scale().addTo(map);
	const Coordinates = L.Control.extend({
    onAdd: map => {
		const container = L.DomUtil.create("div");
		map.addEventListener("mousemove", e => {
			container.innerHTML = `
			Mouse: 
			${e.latlng.lat.toFixed(4)}°N, 
			${e.latlng.lng.toFixed(4)}°E
			`;
		});
		return container;
	}
	});
	map.addControl(new Coordinates({ position: "bottomleft" }));

</script>
